<body>
  <div class="form-container text-center">
    <h1 class="title">Adaugați o carte</h1>
  </div>
  <div class="all">
    <div class="form-container">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="bookmark"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16.5 3.75V16.5L12 14.25 7.5 16.5V3.75m9 0H18A2.25 2.25 0 0 1 20.25 6v12A2.25 2.25 0 0 1 18 20.25H6A2.25 2.25 0 0 1 3.75 18V6A2.25 2.25 0 0 1 6 3.75h1.5m9 0h-9"
        />
      </svg>

      <form #form="ngForm" (submit)="onSubmit(form)" class="form-content">
        <input type="hidden" name="id" [value]="service.formData.id" />
        <div class="form-group">
          <label for="name">Book Name</label>
          <input
            id="name"
            class="form-control"
            placeholder="Name of the book"
            #name="ngModel"
            name="name"
            [(ngModel)]="service.formData.name"
          />
        </div>
        <div class="form-group">
          <label for="author">Book Author</label>
          <input
            id="author"
            class="form-control"
            placeholder="Name of the author"
            #author="ngModel"
            name="author"
            [(ngModel)]="service.formData.author"
          />
        </div>
        <div class="form-group">
          <label for="desc">Description</label>
          <input
            id="desc"
            class="form-control"
            placeholder="Description of the book"
            #desc="ngModel"
            name="desc"
            [(ngModel)]="service.formData.description"
          />
        </div>
        <div class="form-group">
          <label for="pdf">Pdf_Link</label>
          <input
            id="pdf"
            class="form-control"
            placeholder="Link to the pdf, must be a PixelDrain link"
            #pdf="ngModel"
            name="pdf"
            [(ngModel)]="service.formData.pdf_Url"
          />
        </div>

        <div class="form-group d-grid">
          <button class="btn" type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
</body>
